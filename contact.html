<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./Assets/CSS/style.css">
</head>

<body>
    <header class="navbar-container">
        <nav class="nav_bar">
            <a class="brand" href="index.html">CyberSec 1st Sem</a>
            <div class="tab-buttons">
                <a class="tab-button" href="index.html">HOME</a>
                <a class="tab-button" href="about.html">ABOUT</a>
                <a class="tab-button" href="skills.html">SKILLS</a>
                <a class="tab-button" href="projects.html">PROJECTS</a>
                <a class="tab-button active" aria-current="page" href="contact.html">CONTACT</a>
            </div>
            <div class="nav-meta">
                <span id="live-time" class="live-time"></span>
                <button id="theme-toggle" class="theme-button" type="button">Light Mode</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="section-heading">
                <h2>Contact</h2>
                <p>Feel free to reach out for       cybersecurity discussions, collaboration, or professional opportunities</p>
            </div>
            <div class="contact-links">
                <a class="contact-link" href="mailto:nafeezasnfs@gmail.com">Email</a>
                <a class="contact-link" href="https://github.com/M-Nafees-Cyber" target="_blank" rel="noreferrer">GitHub</a>
                <a class="contact-link" href="https://linkedin.com/in/nafees-nazar-575b88280" target="_blank" rel="noreferrer">LinkedIn</a>
            </div>
            <form id="contact-form" class="contact-form">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your name" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write a message..."></textarea>

                <button type="submit" class="primary-button">Send Message</button>
                <p id="form-message" class="form-message"></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>First Semester Cybersecurity Portfolio • Built with HTML, CSS, and JavaScript</p>
    </footer>

    <script src="./Assets/JS/script.js"></script>
</body>

</html>
